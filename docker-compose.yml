services:
  postgres:
    image: postgres:16-alpine
    container_name: techcase-postgres
    environment:
      POSTGRES_DB: techcase
      POSTGRES_USER: techcase
      POSTGRES_PASSWORD: techcase
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techcase -d techcase"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: techcase-api
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: techcase
      DB_USER: techcase
      DB_PASSWORD: techcase
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: